  <style>
    :root {
      --line: #06c755;

    .main { display: flex; flex-direction: column; width: 100%; height: 100vh; margin-left: 320px; padding: 18px; overflow: hidden; }
    h1 {
      position: relative;
      display: flex;

    h1::before {

      width: 34px;
      height: 34px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background:
        linear-gradient(var(--border), var(--border)) 9px 10px / 16px 3px no-repeat,
        linear-gradient(var(--border), var(--border)) 9px 16px / 12px 3px no-repeat,

    .btn:hover:not(:disabled) { background: var(--primary-hover); box-shadow: 6px 7px 0 var(--border); transform: translate(-1px, -1px); }
    .btn:focus-visible, .stat-btn:focus-visible {

    .btn.secondary:hover:not(:disabled) { background: #96d0df; }
    .btn.success { background: var(--line); color: #10251d; }

    #btnZip { background: var(--accent); color: var(--text); }

    .btn.danger { background: var(--danger); color: #fff; }
    .btn.danger:hover:not(:disabled) { background: var(--danger-hover); }
    .btn.soft-danger { background: var(--danger-soft); color: var(--danger-hover); }
    .btn.soft-danger:hover:not(:disabled) { background: #ffc2c2; }
    .btn:disabled { background: #d8dde5; border-color: #8b95a5; color: #6e7785; cursor: not-allowed; opacity: 1; box-shadow: 2px 3px 0 #8b95a5; transform: none; }
    #btnZip:disabled { background: #d8dde5; color: #6e7785; }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;

    .stat-btn {
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 9px;

      text-align: center;

      transition: background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }
    .stat-btn:hover { box-shadow: 4px 5px 0 var(--border); transform: translate(-1px, -1px); }
    .stat-btn[data-filter=all] { background: #dce7ff; }
    .stat-btn[data-filter=pass] { background: #b9f7c8; }
    .stat-btn[data-filter=fail] { background: #ffd8d8; }
    .stat-btn[data-filter=all].active { background: var(--accent); color: var(--text); }
    .stat-btn[data-filter=pass].active { background: var(--line); color: #10251d; }
    .stat-btn[data-filter=fail].active { background: var(--danger); color: #fff; }
    .stat-btn b { display: block; font-size: 1.35rem; }
    .stat-btn span { color: inherit; font-size: 0.75rem; }
    .stat-btn:not(.active)[data-filter=all] b { color: var(--primary); }
    .stat-btn:not(.active)[data-filter=pass] b { color: var(--success); }
    .stat-btn:not(.active)[data-filter=fail] b { color: var(--danger); }
    .toolbar {
      display: flex;
      flex: 0 0 auto;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      height: 72px;

    .toolbar-actions { display: flex; flex: 0 0 auto; gap: 8px; justify-content: flex-end; }

    }
    .card:hover { box-shadow: var(--shadow); }
    .card.hidden { display: none; }

      display: flex;
      align-items: center;
      justify-content: space-between;

      border-bottom: 2px solid var(--border);

      font-weight: 700;
    }
    .name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pick { flex: 0 0 auto; width: 16px; height: 16px; }
    .badge {

    .badge.warn { background: #d88700; }
    .card-body { display: flex; flex: 1; flex-direction: column; padding: 10px; }
    .preview {
      display: grid;
      place-items: center;
      min-height: 170px;
      border: 2px solid #d8d1c8;
      border-radius: 14px;
      margin-bottom: 9px;
      overflow: hidden;
      background:
        linear-gradient(45deg, #d8e7df 25%, transparent 25%),
        linear-gradient(-45deg, #d8e7df 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d8e7df 75%),
        linear-gradient(-45deg, transparent 75%, #d8e7df 75%);
      background-color: #fff;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
    }
    canvas { display: block; max-width: 100%; height: auto; }
    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 8px;
      font-size: 0.78rem;
    }
    .meta div {
      border: 2px solid #d8d1c8;
      border-radius: 12px;
      padding: 6px;
      background: #fffefa;
      box-shadow: var(--clay-inset);
    }
    .meta .size { grid-column: 1 / -1; }
    .meta .bad { color: var(--danger); font-weight: 750; }
    .meta .ok { color: var(--success); font-weight: 750; }
    .issues { color: var(--danger); font-size: 0.78rem; line-height: 1.45; margin-bottom: 8px; }
    .card-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-top: auto; padding-top: 8px; }
    .card-actions .btn { min-height: 34px; padding: 7px 8px; font-size: 0.82rem; }
    .empty {
      display: grid;
      place-items: center;
      min-height: 55vh;
      color: #6a7d75;
      text-align: center;
      line-height: 1.7;
    }
    .empty-card {
      width: min(420px, 100%);
      border: 2px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--clay-shadow);
      padding: 30px 26px;
    }
    .empty-icon {
      display: grid;
      place-items: center;
      width: 74px;
      height: 74px;
      margin: 0 auto 16px;
      border: 2px solid var(--border);
      border-radius: 20px;
      background: #b9f7c8;
      box-shadow: var(--clay-shadow-soft);
      color: var(--text);
    }
    .empty-icon svg { width: 38px; height: 38px; }
    .empty h3 { margin-bottom: 6px; color: var(--text); font-size: 1.08rem; }
    .empty p { margin-bottom: 18px; color: var(--muted); }
    .empty .btn { min-width: 150px; }
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;

    .dialog {
      width: min(420px, 100%);

    .dialog h3 { font-size: 1rem; margin-bottom: 8px; color: var(--text); }
    .dialog p { color: #536a61; line-height: 1.6; margin-bottom: 16px; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; }
    @media (max-width: 760px) {
      .app { display: block; }
      .sidebar { position: static; width: auto; max-height: none; border-right: 0; border-bottom: 1px solid #d4eadf; }
      .main { height: auto; min-height: 100vh; margin-left: 0; padding: 12px; overflow: visible; }
      .results-scroll { overflow: visible; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }

  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>LINE 貼圖檢查</h1>
      <p class="subtitle">依 LINE Creators Market 圖片規範檢查 PNG、透明去背、偶數尺寸、最大尺寸與約 10px 留白。</p>

      <div class="upload-area" id="uploadArea">
        <div>
          <strong>選擇 PNG</strong><br />
          <span>或拖曳多張圖片到這裡</span>
          <p class="hint">只接受 PNG。JPG、GIF、WebP 會略過。</p>
        </div>
        <input type="file" id="fileInput" accept="image/png,.png" multiple />
      </div>

      <div class="panel">
        <div class="field">
          <label for="minMargin">最小透明留白</label>
          <input type="number" id="minMargin" value="10" min="0" max="80" />
          <p class="hint">LINE 說明為「10px 左右」。檢查與修正都使用這個值。</p>
        </div>
        <label class="check-row">
          <input type="checkbox" id="autoCenter" checked />
          修正時自動置中內容
        </label>
        <p class="hint">修正會輸出透明背景 PNG。大圖會先縮到規範尺寸內，再用縮小後圖片計算留白。</p>
      </div>

      <div class="panel">
        <div class="summary">
          <button class="stat-btn active" data-filter="all"><b id="sumTotal">0</b><span>全部</span></button>
          <button class="stat-btn" data-filter="pass"><b id="sumPass">0</b><span>通過</span></button>
          <button class="stat-btn" data-filter="fail"><b id="sumFail">0</b><span>需修正</span></button>
        </div>
        <div class="actions">
          <button class="btn" id="btnFixAll" disabled>一鍵修正</button>
          <button class="btn success" id="btnZip" disabled>打包修正後 PNG</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <h2 id="resultTitle">尚未上傳圖片</h2>
        <div class="toolbar-actions">
          <button class="btn soft-danger" id="btnDeleteSelected" disabled>刪除勾選圖片</button>
          <button class="btn danger" id="btnClear" disabled>清除全部</button>
        </div>
      </div>
      <div class="results-scroll">
        <div class="empty" id="emptyState"></div>
        <div class="grid" id="resultsGrid"></div>
      </div>
    </main>
  </div>

  <div class="dialog-backdrop" id="zipDialog" role="dialog" aria-modal="true" aria-labelledby="zipDialogTitle">
    <div class="dialog">
      <h3 id="zipDialogTitle">只打包已通過圖片？</h3>
      <p id="zipDialogText"></p>
      <div class="dialog-actions">
        <button class="btn secondary" id="btnZipCancel">取消</button>
        <button class="btn" id="btnZipConfirm">打包下載</button>
      </div>
    </div>
  </div>

  <script>
    const SPEC = { label: '貼圖圖片', w: 370, h: 320, exact: false };
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const minMargin = document.getElementById('minMargin');
    const autoCenter = document.getElementById('autoCenter');
    const resultsGrid = document.getElementById('resultsGrid');
    const emptyState = document.getElementById('emptyState');
    const resultTitle = document.getElementById('resultTitle');
    const btnFixAll = document.getElementById('btnFixAll');
    const btnZip = document.getElementById('btnZip');
    const zipDialog = document.getElementById('zipDialog');
    const zipDialogText = document.getElementById('zipDialogText');
    const btnZipCancel = document.getElementById('btnZipCancel');
    const btnZipConfirm = document.getElementById('btnZipConfirm');
    const btnDeleteSelected = document.getElementById('btnDeleteSelected');
    const btnClear = document.getElementById('btnClear');
    const rows = [];
    let filter = 'all';

    uploadArea.addEventListener('click', () => fileInput.click());
    emptyState.addEventListener('click', e => {
      if (e.target.closest('[data-act=empty-upload]')) fileInput.click();
    });
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));
    minMargin.addEventListener('change', recheckAll);
    document.querySelectorAll('.stat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.stat-btn').forEach(b => b.classList.toggle('active', b === btn));
        applyFilter();
      });
    });
    btnFixAll.addEventListener('click', () => rows.filter(r => !r.result.pass).forEach(fixRow));
    btnZip.addEventListener('click', downloadZip);
    btnZipCancel.addEventListener('click', closeZipDialog);
    btnZipConfirm.addEventListener('click', () => {
      closeZipDialog();
      saveZip(rows.filter(row => row.result.pass));
    });
    zipDialog.addEventListener('click', e => { if (e.target === zipDialog) closeZipDialog(); });
    btnDeleteSelected.addEventListener('click', () => deleteRows(rows.filter(row => row.selected)));
    btnClear.addEventListener('click', () => {
      rows.length = 0;
      resultsGrid.innerHTML = '';
      fileInput.value = '';
      updateSummary();
    });
    applyFilter();

    function handleFiles(files) {
      Array.from(files)
        .filter(file => file.type === 'image/png' || file.name.toLowerCase().endsWith('.png'))
        .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }))
        .forEach(file => {
        const reader = new FileReader();
        reader.onload = e => loadImage(file.name, e.target.result);
        reader.readAsDataURL(file);
      });
    }

    function loadImage(name, src) {
      const img = new Image();
      img.onload = () => {
        const row = { name, originalImg: img, currentImg: img, currentUrl: src, fixedUrl: '', selected: false, result: null, card: document.createElement('div') };
        row.result = analyze(img);
        rows.push(row);
        rows.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
        resultsGrid.innerHTML = '';
        rows.forEach(item => resultsGrid.appendChild(item.card));
        render(row);
        updateSummary();
      };
      img.src = src;
    }

    function recheckAll() {
      rows.forEach(row => {
        row.result = analyze(row.currentImg);
        render(row);
      });
      updateSummary();
    }

    function analyze(img) {
      const spec = SPEC;
      const normalized = fitToSpec(img, false);
      const scan = scanAlpha(normalized.canvas);
      const margin = Number(minMargin.value) || 0;
      const issues = [];
      const exactBad = spec.exact && (normalized.canvas.width !== spec.w || normalized.canvas.height !== spec.h);
      const maxBad = !spec.exact && (normalized.canvas.width > spec.w || normalized.canvas.height > spec.h);
      const evenBad = normalized.canvas.width % 2 || normalized.canvas.height % 2;

      if (img.width !== normalized.canvas.width || img.height !== normalized.canvas.height) issues.push(`大圖需縮小至 ${spec.w}×${spec.h}`);
      if (exactBad) issues.push(`尺寸需為 ${spec.w}×${spec.h}`);
      if (maxBad) issues.push(`尺寸不可超過 ${spec.w}×${spec.h}`);
      if (evenBad) issues.push('寬高需為偶數');
      if (!hasTransparency(normalized.canvas)) issues.push('背景需有透明區域');
      if (!scan.box) issues.push('未偵測到不透明內容');
      if (scan.box && Object.values(scan.margins).some(v => v < margin)) issues.push(`透明留白需至少 ${margin}px`);

      return { canvas: normalized.canvas, box: scan.box, margins: scan.margins, issues, pass: issues.length === 0 };
    }

    function fitToSpec(img, exact) {
      const spec = SPEC;
      const w = exact ? spec.w : even(Math.min(img.width, spec.w));
      const h = exact ? spec.h : even(Math.min(img.height, spec.h));
      const scale = Math.min(w / img.width, h / img.height, 1);
      const dw = even(Math.max(1, Math.round(img.width * scale)));
      const dh = even(Math.max(1, Math.round(img.height * scale)));
      const canvas = document.createElement('canvas');
      canvas.width = exact ? spec.w : dw;
      canvas.height = exact ? spec.h : dh;
      drawResampled(img, canvas, 0, 0, img.width, img.height, 0, 0, canvas.width, canvas.height);
      return { canvas };
    }

    function scanAlpha(canvas) {
      const { width: w, height: h } = canvas;
      const data = canvas.getContext('2d').getImageData(0, 0, w, h).data;
      let top = h, left = w, right = -1, bottom = -1;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          if (data[(y * w + x) * 4 + 3] <= 10) continue;
          if (x < left) left = x;
          if (x > right) right = x;
          if (y < top) top = y;
          if (y > bottom) bottom = y;
        }
      }
      if (right < left || bottom < top) return { box: null, margins: { top: 0, right: 0, bottom: 0, left: 0 } };
      return {
        box: { top, right, bottom, left },
        margins: { top, right: w - 1 - right, bottom: h - 1 - bottom, left }
      };
    }

    function hasTransparency(canvas) {
      const data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
      for (let i = 3; i < data.length; i += 4) if (data[i] < 255) return true;
      return false;
    }

    function fixRow(row) {
      const spec = SPEC;
      const margin = Number(minMargin.value) || 0;
      const base = imageToCanvas(row.originalImg);
      const scan = scanAlpha(base);
      if (!scan.box) return;

      const contentW = scan.box.right - scan.box.left + 1;
      const contentH = scan.box.bottom - scan.box.top + 1;
      const maxContentW = spec.w - margin * 2;
      const maxContentH = spec.h - margin * 2;
      const scale = Math.min(maxContentW / contentW, maxContentH / contentH, 1);
      const drawW = Math.max(1, Math.floor(contentW * scale));
      const drawH = Math.max(1, Math.floor(contentH * scale));
      const widerThanSpec = contentW / contentH >= maxContentW / maxContentH;
      const finalW = widerThanSpec && scale < 1 ? spec.w : Math.min(spec.w, evenUp(drawW + margin * 2));
      const finalH = !widerThanSpec && scale < 1 ? spec.h : Math.min(spec.h, evenUp(drawH + margin * 2));
      const keepX = margin;
      const keepY = margin;
      const drawX = autoCenter.checked ? Math.round((finalW - drawW) / 2) : keepX;
      const drawY = autoCenter.checked ? Math.round((finalH - drawH) / 2) : keepY;
      const fixed = document.createElement('canvas');
      fixed.width = finalW;
      fixed.height = finalH;
      drawResampled(base, fixed, scan.box.left, scan.box.top, contentW, contentH, drawX, drawY, drawW, drawH);
      row.fixedUrl = fixed.toDataURL('image/png');
      const img = new Image();
      img.onload = () => {
        row.currentImg = img;
        row.currentUrl = row.fixedUrl;
        row.result = analyze(img);
        render(row);
        updateSummary();
      };
      img.src = row.fixedUrl;
    }

    function imageToCanvas(img) {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      drawWithQuality(canvas.getContext('2d'), img, 0, 0);
      return canvas;
    }

    function drawResampled(src, dest, sx, sy, sw, sh, dx, dy, dw, dh) {
      const crop = document.createElement('canvas');
      crop.width = sw;
      crop.height = sh;
      drawWithQuality(crop.getContext('2d'), src, sx, sy, sw, sh, 0, 0, sw, sh);

      let current = crop;
      while (current.width * 0.5 > dw && current.height * 0.5 > dh) {
        const next = document.createElement('canvas');
        next.width = Math.max(dw, Math.floor(current.width * 0.5));
        next.height = Math.max(dh, Math.floor(current.height * 0.5));
        drawWithQuality(next.getContext('2d'), current, 0, 0, current.width, current.height, 0, 0, next.width, next.height);
        current = next;
      }

      drawWithQuality(dest.getContext('2d'), current, 0, 0, current.width, current.height, dx, dy, dw, dh);
    }

    function drawWithQuality(ctx, img, ...args) {
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, ...args);
    }

    function render(row) {
      const result = row.result;
      const spec = SPEC;
      const preview = makePreview(result);
      const m = result.margins;
      const fixed = row.fixedUrl && row.currentUrl === row.fixedUrl;
      const sizeW = fixed ? row.currentImg.width : row.originalImg.width;
      const sizeH = fixed ? row.currentImg.height : row.originalImg.height;
      const originalSizeBad = row.originalImg.width > spec.w || row.originalImg.height > spec.h || row.originalImg.width % 2 || row.originalImg.height % 2;
      row.card.className = `card ${result.pass ? 'pass' : 'fail'}`;
      row.card.dataset.status = result.pass ? 'pass' : 'fail';
      row.card.innerHTML = `
        <div class="card-head">
          <input class="pick" type="checkbox" ${row.selected ? 'checked' : ''} aria-label="選取 ${esc(row.name)}">
          <span class="name" title="${esc(row.name)}">${esc(row.name)}</span>
          <span class="badge ${result.pass ? 'pass' : ''}">${result.pass ? '通過' : '需修正'}</span>
        </div>
        <div class="card-body">
          <div class="preview"></div>
          <div class="meta">
            <div class="size">尺寸 <span class="${fixed ? 'ok' : (originalSizeBad ? 'bad' : 'ok')}">${sizeW}×${sizeH}</span></div>
            <div>上 ${fmt(m.top)}</div><div>下 ${fmt(m.bottom)}</div>
            <div>左 ${fmt(m.left)}</div><div>右 ${fmt(m.right)}</div>
          </div>
          ${result.issues.length ? `<div class="issues">${result.issues.map(esc).join('<br>')}</div>` : ''}
          <div class="card-actions">
            <button class="btn" data-act="fix" ${result.pass ? 'disabled' : ''}>修正</button>
            <button class="btn success" data-act="download" ${result.pass ? '' : 'disabled'}>下載</button>
            <button class="btn danger" data-act="delete">刪除</button>
          </div>
        </div>`;
      row.card.querySelector('.preview').appendChild(preview);
      row.card.querySelector('.pick').addEventListener('change', e => {
        row.selected = e.target.checked;
        updateSummary();
      });
      row.card.querySelector('[data-act=fix]').addEventListener('click', () => fixRow(row));
      row.card.querySelector('[data-act=download]').addEventListener('click', () => download(row.currentUrl, fixedName(row.name), 'image/png'));
      row.card.querySelector('[data-act=delete]').addEventListener('click', () => deleteRows([row]));
      applyFilter();
    }

    function makePreview(result) {
      const src = result.canvas;
      const scale = Math.min(1, 190 / Math.max(src.width, src.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(src.width * scale));
      canvas.height = Math.max(1, Math.round(src.height * scale));
      const ctx = canvas.getContext('2d');
      drawResampled(src, canvas, 0, 0, src.width, src.height, 0, 0, canvas.width, canvas.height);
      if (result.box) {
        ctx.strokeStyle = result.pass ? '#21885a' : '#d64545';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 3]);
        ctx.strokeRect(result.box.left * scale, result.box.top * scale, (result.box.right - result.box.left + 1) * scale, (result.box.bottom - result.box.top + 1) * scale);
      }
      return canvas;
    }

    function updateSummary() {
      const pass = rows.filter(r => r.result.pass).length;
      const fail = rows.length - pass;
      document.getElementById('sumTotal').textContent = rows.length;
      document.getElementById('sumPass').textContent = pass;
      document.getElementById('sumFail').textContent = fail;
      btnFixAll.disabled = fail === 0;
      btnZip.disabled = pass === 0;
      btnDeleteSelected.disabled = !rows.some(row => row.selected);
      btnClear.disabled = rows.length === 0;
      applyFilter();
    }

    function applyFilter() {
      let visible = 0;
      rows.forEach(row => {
        const show = filter === 'all' || row.card.dataset.status === filter;
        row.card.classList.toggle('hidden', !show);
        if (show) visible++;
      });
      const labels = { all: '全部', pass: '通過', fail: '需修正' };
      resultTitle.textContent = rows.length ? `${labels[filter]}：${visible} 張圖片` : '尚未上傳圖片';
      emptyState.innerHTML = rows.length ? '此篩選條件下沒有圖片。' : `
        <div class="empty-card">
          <div class="empty-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <path d="M14 2v6h6"></path>
              <path d="M12 18v-7"></path>
              <path d="m9 14 3-3 3 3"></path>
            </svg>
          </div>
          <h3>尚未上傳圖片</h3>
          <p>選擇 PNG 後，檢查結果會以卡片顯示在這裡。</p>
          <button class="btn" type="button" data-act="empty-upload">選擇 PNG</button>
        </div>`;
      emptyState.style.display = visible ? 'none' : 'grid';
    }

    function deleteRows(targets) {
      targets.forEach(row => {
        const idx = rows.indexOf(row);
        if (idx >= 0) rows.splice(idx, 1);
        row.card.remove();
      });
      updateSummary();
    }

    function downloadZip() {
      const passRows = rows.filter(row => row.result.pass);
      if (!passRows.length) return;
      if (passRows.length < rows.length) {
        zipDialogText.textContent = `尚有 ${rows.length - passRows.length} 張圖片未修正，將只打包下載已通過檢查的 ${passRows.length} 張圖片。`;
        zipDialog.classList.add('show');
        btnZipConfirm.focus();
        return;
      }
      saveZip(passRows);
    }

    function closeZipDialog() {
      zipDialog.classList.remove('show');
    }

    function saveZip(passRows) {
      const files = passRows.map(row => ({ name: row.name, bytes: dataUrlBytes(row.currentUrl) }));
      const blob = makeZip(files);
      download(URL.createObjectURL(blob), 'line-stickers-fixed.zip', 'application/zip');
    }

    function makeZip(files) {
      const chunks = [];
      const central = [];
      let offset = 0;
      files.forEach(file => {
        const name = utf8(file.name);
        const crc = crc32(file.bytes);
        const flag = 0x0800;
        const local = bytes(0x04034b50, 4, 20, 2, flag, 2, 0, 2, 0, 2, 0, 2, crc, 4, file.bytes.length, 4, file.bytes.length, 4, name.length, 2, 0, 2);
        chunks.push(local, name, file.bytes);
        central.push(bytes(0x02014b50, 4, 20, 2, 20, 2, flag, 2, 0, 2, 0, 2, 0, 2, crc, 4, file.bytes.length, 4, file.bytes.length, 4, name.length, 2, 0, 2, 0, 2, 0, 2, 0, 2, 0, 4, offset, 4), name);
        offset += local.length + name.length + file.bytes.length;
      });
      const centralSize = central.reduce((n, c) => n + c.length, 0);
      chunks.push(...central, bytes(0x06054b50, 4, 0, 2, 0, 2, files.length, 2, files.length, 2, centralSize, 4, offset, 4, 0, 2));
      return new Blob(chunks);
    }

    function bytes(...pairs) {
      const out = [];
      for (let i = 0; i < pairs.length; i += 2) {
        let value = pairs[i], size = pairs[i + 1];
        while (size--) { out.push(value & 255); value >>>= 8; }
      }
      return new Uint8Array(out);
    }

    function crc32(data) {
      let crc = -1;
      for (const byte of data) {
        crc ^= byte;
        for (let i = 0; i < 8; i++) crc = (crc >>> 1) ^ (0xedb88320 & -(crc & 1));
      }
      return (crc ^ -1) >>> 0;
    }

    function dataUrlBytes(url) {
      const bin = atob(url.split(',')[1]);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    function download(url, name) {
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      if (url.startsWith('blob:')) setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function fixedName(name) {
      return name.replace(/\.[^.]+$/, '') + '_fixed.png';
    }
    function utf8(text) { return new TextEncoder().encode(text); }
    function even(n) { n = Math.max(2, Math.round(n)); return n % 2 ? n - 1 : n; }
    function evenUp(n) { n = Math.max(2, Math.ceil(n)); return n % 2 ? n + 1 : n; }
    function fmt(n) { return `<span class="${n >= (Number(minMargin.value) || 0) ? 'ok' : 'bad'}">${n}px</span>`; }
    function esc(str) { return String(str).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch])); }
  </script>
</body>
</html>
