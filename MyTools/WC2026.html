    /**
     * 建立國旗圖片元素（fallback 到 emoji）
     */
    function createFlagEl(enName, fallbackEmoji) {
      const wrapper = document.createElement('span');
      wrapper.className = 'team-flag';

      const flagUrl = getTeamFlag(enName);
      if (flagUrl) {
        const img = document.createElement('img');
        img.src = flagUrl;
        img.alt = enName + ' flag';
        img.setAttribute('aria-label', enName + ' flag');
        img.setAttribute('role', 'img');
        img.loading = 'lazy';
        img.decoding = 'async';
        // 圖片載入失敗時降級為 emoji
        img.onerror = () => {
          img.remove();
          const finalEmoji = (fallbackEmoji === '🏴' || !fallbackEmoji) ? '⚽' : fallbackEmoji;
          wrapper.textContent = finalEmoji;
          wrapper.setAttribute('aria-label', enName + ' flag');
        };
        wrapper.appendChild(img);
      } else {
        // 使用 emoji fallback
        wrapper.setAttribute('aria-label', enName + ' flag');
        wrapper.setAttribute('role', 'img');
        const finalEmoji = (fallbackEmoji === '🏴' || !fallbackEmoji) ? '⚽' : fallbackEmoji;
        wrapper.textContent = finalEmoji;
      }

      return wrapper;
    }

    /**
     * 建立單張 Match Card DOM 元素
     */
    function createMatchCard(event, animDelay = 0) {
      const status = getMatchStatus(event);
      const homeNameLocale = getTeamName(event.homeTeam);
      const awayNameLocale = getTeamName(event.awayTeam);
      const stageName = getStageName(event);
      const timeStr = formatTime(event.dtStart);

      // ── article 容器 ──
      const article = document.createElement('article');
      article.className = 'match-card';
      if (status === 'live')     article.classList.add('is-live');
      if (status === 'finished') article.classList.add('is-finished');
      article.style.animationDelay = `${animDelay}ms`;

      // ARIA label（完整賽事描述）
      let scoreDesc = '';
      if (status === 'finished') {
        scoreDesc = `${event.homeScore} - ${event.awayScore}`;
      } else if (status === 'live') {
        scoreDesc = t('match.live');
      } else {
        scoreDesc = t('match.vs');
      }
      article.setAttribute('aria-label',
        `${homeNameLocale} ${scoreDesc} ${awayNameLocale}, ${timeStr}, ${stageName}${event.venue ? ', ' + event.venue : ''}`
      );

      // ── 頂列（時間 + 組別 + 狀態標籤）──
      const cardTop = document.createElement('div');
      cardTop.className = 'card-top';

      // 時間
      const timeEl = document.createElement('time');
      timeEl.className = 'card-time';
      timeEl.dateTime = event.dtStart.toISOString();
      timeEl.textContent = timeStr;
      cardTop.appendChild(timeEl);

      // 組別/階段標籤
      const stageEl = document.createElement('span');
      stageEl.className = 'card-stage';
      let groupClass = '';
      if (event.stageType === 'group') {
        const letter = event.groupLetter || (event.rawStage || '').match(/Group\s+([A-Z])/i)?.[1];
        if (letter) {
          groupClass = `stage-group-${letter.toLowerCase()}`;
        }
      }
      if (groupClass) {
        stageEl.classList.add(groupClass);
      } else {
        stageEl.classList.add(`stage-${event.stageType}`);
      }
      stageEl.textContent = stageName;
      cardTop.appendChild(stageEl);

      // 狀態標籤
      if (status === 'live' || status === 'finished') {
        const statusWrap = document.createElement('div');
        statusWrap.className = 'card-status-wrap';

        const badge = document.createElement('span');
        if (status === 'live') {
          badge.className = 'badge-live';
          badge.setAttribute('aria-label', t('match.live'));
          badge.textContent = t('match.live');
        } else {
          badge.className = 'badge-ft';
          badge.setAttribute('aria-label', t('match.ft'));
          badge.textContent = t('match.ft');
        }
        statusWrap.appendChild(badge);
        cardTop.appendChild(statusWrap);
      }

      article.appendChild(cardTop);

      // ── 比賽主體（隊名 + 比分）──
      const matchBody = document.createElement('div');
      matchBody.className = 'card-match';

      // 主隊
      const homeTeamEl = document.createElement('div');
      homeTeamEl.className = 'card-team home';
      homeTeamEl.appendChild(createFlagEl(event.homeTeam, event.homeFlag));
      const homeNameEl = document.createElement('span');
      homeNameEl.className = 'team-name';
      homeNameEl.textContent = homeNameLocale;
      homeTeamEl.appendChild(homeNameEl);
      matchBody.appendChild(homeTeamEl);

      // 比分
      const scoreEl = document.createElement('div');
      scoreEl.className = 'card-score';
      scoreEl.setAttribute('aria-hidden', 'true'); // 比分已在 aria-label 中宣告

      if (status === 'notStarted') {
        // 未開始：顯示 vs
        const vsEl = document.createElement('span');
        vsEl.className = 'score-vs';
        vsEl.textContent = t('match.vs');
        scoreEl.appendChild(vsEl);
      } else {
        // 有比分（或 LIVE）
        const homeScoreEl = document.createElement('span');
        homeScoreEl.className = 'score-num';
        homeScoreEl.textContent = event.homeScore ?? '?';

        const sepEl = document.createElement('span');
        sepEl.className = 'score-sep';
        sepEl.textContent = '-';

        const awayScoreEl = document.createElement('span');
        awayScoreEl.className = 'score-num';
        awayScoreEl.textContent = event.awayScore ?? '?';

        // 完場已有比分的賽事，數字較小的比分請用較暗淡的顏色；若為平手則不做處理
        if (status === 'finished' && event.homeScore !== null && event.awayScore !== null) {
          if (event.homeScore < event.awayScore) {
            homeScoreEl.classList.add('is-dimmed');
          } else if (event.awayScore < event.homeScore) {
            awayScoreEl.classList.add('is-dimmed');
          }
        }

        scoreEl.appendChild(homeScoreEl);
        scoreEl.appendChild(sepEl);
        scoreEl.appendChild(awayScoreEl);
      }
      matchBody.appendChild(scoreEl);

      // 客隊
      const awayTeamEl = document.createElement('div');
      awayTeamEl.className = 'card-team away';
      awayTeamEl.appendChild(createFlagEl(event.awayTeam, event.awayFlag));
      const awayNameEl = document.createElement('span');
      awayNameEl.className = 'team-name';
      awayNameEl.textContent = awayNameLocale;
      awayTeamEl.appendChild(awayNameEl);
      matchBody.appendChild(awayTeamEl);

      article.appendChild(matchBody);

      // ── 場館資訊 ──
      if (event.venue) {
        const venueEl = document.createElement('div');
        venueEl.className = 'card-venue';

        const iconEl = document.createElement('span');
        iconEl.className = 'venue-icon';
        iconEl.setAttribute('aria-hidden', 'true');
        iconEl.textContent = '📍';

        const textEl = document.createElement('span');
        textEl.className = 'venue-text';
        const venueText = event.city ? `${event.venue}, ${event.city}` : event.venue;
        textEl.textContent = venueText;
        textEl.title = venueText;

        venueEl.appendChild(iconEl);
        venueEl.appendChild(textEl);
        article.appendChild(venueEl);
      }

      return article;
    }

    /**
     * 渲染賽事列表（根據 state.selectedDate）
     */
    function renderMatches() {
      const container = document.getElementById('matches-container');
      const frag = document.createDocumentFragment();
      const now = Date.now();

      if (state.selectedDate === 'ALL') {
        // ── ALL 模式：依日期分組 ──
        let todayGroupEl = null;
        const todayStr = getLocalDateString(new Date());

        for (const dateStr of state.dates) {
          const dayEvents = state.events.filter(e => getLocalDateString(e.dtStart) === dateStr);
          if (!dayEvents.length) continue;

          const group = document.createElement('section');
          group.className = 'date-group';
          group.id = `group-${dateStr}`;
          group.setAttribute('aria-label', dateStr);

          // 日期標題
          const header = document.createElement('div');
          header.className = 'date-group-header';

          const label = document.createElement('span');
          label.className = 'date-group-label';
          label.textContent = formatGroupHeader(dateStr);

          const count = document.createElement('span');
          count.className = 'date-group-count';
          count.textContent = dayEvents.length;

          header.appendChild(label);
          header.appendChild(count);
          group.appendChild(header);

          // 賽事卡片
          dayEvents.forEach((event, idx) => {
            group.appendChild(createMatchCard(event, idx * 30));
          });

          frag.appendChild(group);

          // 記錄今天分組（用於自動捲動）
          if (dateStr === todayStr) {
            todayGroupEl = group;
          }
        }

        // 若無今天，找最近的未來日期
        if (!todayGroupEl) {
          const futureDate = state.dates.find(d => d >= todayStr);
          if (futureDate) {
            const futureGroup = frag.getElementById
              ? frag.getElementById(`group-${futureDate}`)
              : null;
            todayGroupEl = futureGroup;
          }
        }

        container.innerHTML = '';
        container.appendChild(frag);

        // 自動捲動到當天（或最近）日期分組
        if (todayGroupEl) {
          requestAnimationFrame(() => {
            todayGroupEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        } else {
          // 嘗試用 ID 找
          const todayEl = document.getElementById(`group-${todayStr}`);
          if (todayEl) {
            requestAnimationFrame(() => {
              todayEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
          }
        }

      } else {
        // ── 特定日期模式 ──
        const dateStr = state.selectedDate;
        const dayEvents = state.events.filter(e => getLocalDateString(e.dtStart) === dateStr);

        if (!dayEvents.length) {
          // 空狀態
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          const icon = document.createElement('div');
          icon.className = 'empty-icon';
          icon.setAttribute('aria-hidden', 'true');
          icon.textContent = '📅';
          const text = document.createElement('p');
          text.className = 'empty-text';
          text.textContent = t('no.matches');
          empty.appendChild(icon);
          empty.appendChild(text);
          frag.appendChild(empty);
        } else {
          dayEvents.forEach((event, idx) => {
            frag.appendChild(createMatchCard(event, idx * 40));
          });
        }

        container.innerHTML = '';
        container.appendChild(frag);
      }
    }

    /* ╔══════════════════════════════════════════════════════════╗
       ║  11. 語言切換系統                                        ║
       ╚══════════════════════════════════════════════════════════╝ */

    /**
     * 偵測初始語言
     */
    function detectLanguage() {
      // 優先 localStorage
      const stored = localStorage.getItem(LANG_KEY);
      if (stored && LANGS.some(l => l.code === stored)) return stored;

      // navigator.language
      const navLang = navigator.language || navigator.languages?.[0] || 'en';
      // 嘗試完整匹配（如 zh-TW）
      if (LANG_MAP[navLang]) return LANG_MAP[navLang];
      // 嘗試語言前綴匹配（如 zh-HK → zh-TW）
      const prefix = navLang.split('-')[0];
      if (LANG_MAP[prefix]) return LANG_MAP[prefix];
      return 'en';
    }

    /**
     * 套用語言（更新所有 UI 文字、SEO meta）
     */
    function applyLanguage(lang) {
      state.lang = lang;
      localStorage.setItem(LANG_KEY, lang);

      // 更新 <html lang>
      document.documentElement.setAttribute('lang', lang);

      // 更新 Header
      const titleEl = document.getElementById('header-title');
      if (titleEl) {
        const mainText = t('title.main');
        // 保留 ™ 金色標記
        titleEl.innerHTML = mainText.replace('™', '<span class="tm">™</span>');
      }
      const subtitleEl = document.getElementById('header-subtitle');
      if (subtitleEl) subtitleEl.textContent = t('title.sub');

      // 更新語言按鈕代碼
      const langBtn = LANGS.find(l => l.code === lang);
      const codeEl = document.getElementById('lang-btn-code');
      if (codeEl && langBtn) codeEl.textContent = langBtn.abbr;

      // 更新 Loading 文字
      const loadingTextEl = document.getElementById('loading-text');
      if (loadingTextEl) loadingTextEl.textContent = t('loading');

      // 更新 Error 文字
      const errorTitleEl = document.getElementById('error-title');
      if (errorTitleEl) errorTitleEl.textContent = t('error.title');
      const errorMsgEl = document.getElementById('error-message');
      if (errorMsgEl) errorMsgEl.textContent = t('error.msg');
      const retryEl = document.getElementById('retry-btn');
      if (retryEl) retryEl.textContent = t('retry');

      // 更新語言選單標題
      const panelHeader = document.getElementById('lang-panel-label');
      if (panelHeader) panelHeader.textContent = t('lang.select');

      // 更新語言選單選中狀態
      document.querySelectorAll('.lang-item').forEach(item => {
        const isSelected = item.dataset.lang === lang;
        item.setAttribute('aria-selected', isSelected ? 'true' : 'false');
      });

      // 更新 SEO Meta
      updateSEOMeta(lang);

      // 若已有賽事資料，重新渲染
      if (state.events.length) {
        renderDateBar();
        renderMatches();
      }
    }

    /**
     * 渲染語言選單
     */
    function renderLangMenu() {
      const listbox = document.getElementById('lang-listbox');
      const frag = document.createDocumentFragment();

      LANGS.forEach((lang, idx) => {
        const li = document.createElement('li');
        li.className = 'lang-item';
        li.role = 'option';
        li.dataset.lang = lang.code;
        li.setAttribute('aria-selected', lang.code === state.lang ? 'true' : 'false');
        li.setAttribute('tabindex', '0');
        li.id = `lang-option-${lang.code}`;

        const codeEl = document.createElement('span');
        codeEl.className = 'lang-item-code';
        codeEl.textContent = lang.abbr;

        const nameEl = document.createElement('span');
        nameEl.className = 'lang-item-name';
        nameEl.textContent = lang.name;

        const checkEl = document.createElement('span');
        checkEl.className = 'lang-item-check';
        checkEl.setAttribute('aria-hidden', 'true');
        checkEl.textContent = '✓';

        li.appendChild(codeEl);
        li.appendChild(nameEl);
        li.appendChild(checkEl);

        // 點擊選語言
        li.addEventListener('click', () => {
          applyLanguage(lang.code);
          closeLangDropdown();
        });

        // 鍵盤 Enter / Space
        li.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            applyLanguage(lang.code);
            closeLangDropdown();
          }
        });

        frag.appendChild(li);
      });

      listbox.innerHTML = '';
      listbox.appendChild(frag);
    }

    function openLangDropdown() {
      const dropdown = document.getElementById('lang-dropdown');
      const btn = document.getElementById('lang-btn');
      dropdown.classList.add('open');
      btn.setAttribute('aria-expanded', 'true');
      // 聚焦目前選中項目
      const currentItem = document.querySelector(`.lang-item[data-lang="${state.lang}"]`);
      if (currentItem) currentItem.focus();
    }

    function closeLangDropdown() {
      const dropdown = document.getElementById('lang-dropdown');
      const btn = document.getElementById('lang-btn');
      dropdown.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
      btn.focus();
    }

    // 綁定語言按鈕
    document.getElementById('lang-btn').addEventListener('click', () => {
      const dropdown = document.getElementById('lang-dropdown');
      if (dropdown.classList.contains('open')) {
        closeLangDropdown();
      } else {
        openLangDropdown();
      }
    });

    // 點擊遮罩關閉
    document.getElementById('lang-overlay').addEventListener('click', closeLangDropdown);

    // Escape 關閉
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const dropdown = document.getElementById('lang-dropdown');
        if (dropdown.classList.contains('open')) closeLangDropdown();
      }
    });

    /* ╔══════════════════════════════════════════════════════════╗
       ║  12. SEO 動態更新                                        ║
       ╚══════════════════════════════════════════════════════════╝ */

    function updateSEOMeta(lang) {
      const meta = SEO_META[lang] ?? SEO_META['en'];

      document.title = meta.title;

      // description
      const descEl = document.getElementById('meta-description');
      if (descEl) descEl.setAttribute('content', meta.description);

      // og
      const ogUrl = document.getElementById('og-url');
      const langSlug = lang.toLowerCase().replace('-', '-');
      if (ogUrl) ogUrl.setAttribute('content', `https://nynjfwc26.com/${langSlug}/schedule`);

      const ogTitle = document.getElementById('og-title');
      if (ogTitle) ogTitle.setAttribute('content', meta.title);

      const ogDesc = document.getElementById('og-description');
      if (ogDesc) ogDesc.setAttribute('content', meta.description);

      const ogLocale = document.getElementById('og-locale');
      if (ogLocale) ogLocale.setAttribute('content', meta.ogLocale);

      // twitter
      const twTitle = document.getElementById('tw-title');
      if (twTitle) twTitle.setAttribute('content', meta.title);
      const twDesc = document.getElementById('tw-description');
      if (twDesc) twDesc.setAttribute('content', meta.description);

      // canonical
      const canonical = document.getElementById('canonical-url');
      if (canonical) canonical.setAttribute('href', `https://nynjfwc26.com/${langSlug}/schedule`);
    }

    /**
     * 注入 JSON-LD SportsEvent ItemList
     */
    function injectJSONLD(events) {
      const items = events.slice(0, 104).map((e, i) => ({
        '@type': 'ListItem',
        position: i + 1,
        item: {
          '@type': 'SportsEvent',
          name: `${e.homeTeam} vs ${e.awayTeam}`,
          startDate: e.dtStart.toISOString(),
          endDate: e.dtEnd ? e.dtEnd.toISOString() : undefined,
          location: {
            '@type': 'SportsActivityLocation',
            name: e.venue || 'TBD',
            ...(e.city ? { address: { '@type': 'PostalAddress', addressLocality: e.city } } : {}),
          },
          competitor: [
            { '@type': 'SportsTeam', name: e.homeTeam },
            { '@type': 'SportsTeam', name: e.awayTeam },
          ],
          organizer: {
            '@type': 'Organization',
            name: 'FIFA',
            url: 'https://www.fifa.com',
          },
        },
      }));

      const ld = {
        '@context': 'https://schema.org',
        '@type': 'ItemList',
        name: 'FIFA World Cup 2026™ Match Schedule',
        url: 'https://nynjfwc26.com/en/schedule',
        numberOfItems: events.length,
        itemListElement: items,
      };

      const el = document.getElementById('jsonld-matches');
      if (el) el.textContent = JSON.stringify(ld);
    }

    /**
     * 設定電腦版日期列左右按鈕的點擊與滾動事件
     */
    function setupDateBarArrows() {
      const prevBtn = document.getElementById('date-prev-btn');
      const nextBtn = document.getElementById('date-next-btn');
      const container = document.getElementById('datebar-inner');

      if (prevBtn && nextBtn && container) {
        prevBtn.addEventListener('click', () => {
          container.scrollBy({ left: -240, behavior: 'smooth' });
        });
        nextBtn.addEventListener('click', () => {
          container.scrollBy({ left: 240, behavior: 'smooth' });
        });

        // 監聽滾動以動態隱藏/顯示箭頭
        const updateArrowVisibility = () => {
          const scrollLeft = container.scrollLeft;
          const maxScroll = container.scrollWidth - container.clientWidth;
          
          if (scrollLeft <= 5) {
            prevBtn.style.opacity = '0';
            prevBtn.style.pointerEvents = 'none';
          } else {
            prevBtn.style.opacity = '1';
            prevBtn.style.pointerEvents = 'auto';
          }

          if (scrollLeft >= maxScroll - 5) {
            nextBtn.style.opacity = '0';
            nextBtn.style.pointerEvents = 'none';
          } else {
            nextBtn.style.opacity = '1';
            nextBtn.style.pointerEvents = 'auto';
          }
        };

        container.addEventListener('scroll', updateArrowVisibility);
        // 初始化一次可見性
        setTimeout(updateArrowVisibility, 100);
        window.addEventListener('resize', updateArrowVisibility);
      }
    }

    /* ╔══════════════════════════════════════════════════════════╗
       ║  13. 主程式入口                                          ║
       ╚══════════════════════════════════════════════════════════╝ */

    async function init() {
      // 偵測語言
      state.lang = detectLanguage();

      // 初始化語言選單
      renderLangMenu();

      // 套用語言（更新 UI 文字）
      applyLanguage(state.lang);

      // 顯示 Loading
      document.getElementById('loading-state').style.display = 'flex';
      document.getElementById('error-state').style.display = 'none';
      document.getElementById('matches-container').innerHTML = '';

      try {
        // Fetch ICS 資料
        const icsText = await fetchICS();

        // 解析賽事
        state.events = parseICS(icsText);

        // 計算有比賽的日期（裝置時區）
        const dateSet = new Set(state.events.map(e => getLocalDateString(e.dtStart)));
        state.dates = [...dateSet].sort();

        // 決定預設選中日期
        state.selectedDate = getDefaultDate(state.dates);

        // 隱藏 Loading
        document.getElementById('loading-state').style.display = 'none';

        // 渲染 Date Bar
        renderDateBar();

        // 渲染賽事列表
        renderMatches();

        // 注入 JSON-LD
        injectJSONLD(state.events);



        // 捲動 Date Bar 使選中 Tab 置中
        requestAnimationFrame(() => {
          scrollTabIntoView(state.selectedDate);
        });

      } catch (err) {
        console.error('[FWC26] 資料載入失敗：', err);
        document.getElementById('loading-state').style.display = 'none';
        const errorState = document.getElementById('error-state');
        errorState.style.display = 'flex';
      }
    }

    // Retry 按鈕
    document.getElementById('retry-btn').addEventListener('click', () => {
      // 清除快取，強制重新 fetch
      try { localStorage.removeItem(CACHE_KEY); } catch (_) {}
      init();
    });

    // 頁面載入
    document.addEventListener('DOMContentLoaded', () => {
      init().then(() => {
        setupDateBarArrows();
      });
    });

    // 定期更新 LIVE 狀態（每 30 秒）
    setInterval(() => {
      if (state.events.length) {
        const hasLive = state.events.some(e => getMatchStatus(e) === 'live');
        if (hasLive) renderMatches();
      }
    }, 30000);

  </script>
